<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F1A24" />
    <meta name="description" content="Controle financeiro offline-first do Pontão Beira Rio." />
    <title>Pontão Beira Rio</title>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('pontao_theme') || 'dark2';
          var isDark = theme === 'dark' || theme === 'dark2' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', isDark);
          document.documentElement.classList.toggle('dark2', theme === 'dark2');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
